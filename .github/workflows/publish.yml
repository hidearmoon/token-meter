# BLOCKED: Requires PYPI_API_TOKEN secret to be added to the repository.
# To unblock: Settings → Secrets and variables → Actions → New repository secret
#   Name: PYPI_API_TOKEN
#   Value: <token from https://pypi.org/manage/account/token/>
# Once the secret is set, push a tag (e.g. git tag v0.1.1 && git push --tags)
# to trigger this workflow and publish to PyPI.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatch

      - name: Build distribution
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
